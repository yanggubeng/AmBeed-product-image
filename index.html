<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmBeed 产品图生成器 V1</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="mode-use">
    <main class="app-shell">
      <aside class="control-panel">
        <header class="panel-header">
          <h1>AmBeed 产品图生成器</h1>
          <span>V1</span>
        </header>

        <nav class="mode-tabs" aria-label="模式切换">
          <button class="mode-tab is-active" type="button" data-mode="use">使用模式</button>
          <button class="mode-tab" type="button" data-mode="debug">调整模式</button>
        </nav>

        <section class="panel-section">
          <div class="field-row">
            <label id="packagePickerLabel" for="packagePickerButton">包装模板</label>
            <div class="template-picker" id="packagePicker">
              <button
                id="packagePickerButton"
                class="template-picker-button"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-labelledby="packagePickerLabel packagePickerName"
              >
                <img id="packagePickerThumb" alt="" />
                <span id="packagePickerName">选择包装模板</span>
              </button>
              <div id="packagePickerMenu" class="template-picker-menu" role="listbox"></div>
            </div>
            <select id="packageSelect" class="hidden-select" tabindex="-1" aria-hidden="true"></select>
          </div>
          <div class="field-row" data-debug-only>
            <label for="sampleSelect">测试数据</label>
            <select id="sampleSelect"></select>
          </div>
        </section>

        <section class="panel-section" data-debug-only>
          <div class="section-title">包装模板管理</div>
          <div class="coord-grid template-meta-grid">
            <label>模板编号<input id="newTemplateId" type="text" placeholder="例如 HC099" /></label>
            <label>模板名称<input id="newTemplateName" type="text" placeholder="新包装模板名称" /></label>
            <label>规格<input id="newTemplateSpec" type="text" placeholder="例如 50mL" /></label>
            <label>材质<input id="newTemplateMaterial" type="text" placeholder="例如 玻璃" /></label>
          </div>
          <div class="file-actions">
            <label class="file-control">
              <span>新建模板图片</span>
              <input id="newTemplateImage" type="file" accept="image/*" />
            </label>
            <button id="addTemplateButton" type="button">添加新包装模板</button>
            <label class="file-control">
              <span>替换当前背景图</span>
              <input id="replaceTemplateImage" type="file" accept="image/*" />
            </label>
            <button id="deleteTemplateButton" class="danger-button" type="button">删除当前模板</button>
          </div>
          <div class="section-subtitle" id="templateManageStatus">
            新增模板会以当前模板参数作为初始配置，配置完成后点击“固化到使用模式”。
          </div>
        </section>

        <section class="panel-section" id="fieldForm"></section>

        <section class="panel-section" data-debug-only>
          <div class="section-title">文字定位框</div>
          <div class="coord-grid">
            <label>X<input id="labelX" type="number" step="1" /></label>
            <label>Y<input id="labelY" type="number" step="1" /></label>
            <label>W<input id="labelW" type="number" step="1" min="20" /></label>
            <label>H<input id="labelH" type="number" step="1" min="20" /></label>
          </div>
        </section>

        <section class="panel-section" data-debug-only>
          <div class="section-title">裁切框</div>
          <div class="coord-grid">
            <label>X<input id="clipX" type="number" step="1" /></label>
            <label>Y<input id="clipY" type="number" step="1" /></label>
            <label>W<input id="clipW" type="number" step="1" min="20" /></label>
            <label>H<input id="clipH" type="number" step="1" min="20" /></label>
          </div>
        </section>

        <section class="panel-section" data-debug-only>
          <div class="section-title">文字与曲面</div>
          <div class="coord-grid">
            <label>字号<input id="textScale" type="number" step="0.05" min="0.3" max="2" /></label>
            <label>行距<input id="lineScale" type="number" step="0.05" min="0.5" max="2" /></label>
            <label>曲率<input id="curvePx" type="number" step="1" min="-40" max="40" /></label>
            <label>曲心<input id="curveCenter" type="number" step="1" min="0" max="100" /></label>
            <label>投影<input id="projection" type="number" step="0.01" min="0.2" max="1" /></label>
          </div>
        </section>

        <section class="panel-section" data-debug-only>
          <div class="section-title">字段行</div>
          <div class="field-row">
            <label for="rowSelect">当前字段</label>
            <select id="rowSelect"></select>
          </div>
          <div class="coord-grid">
            <label>X<input id="rowX" type="number" step="1" /></label>
            <label>Y<input id="rowY" type="number" step="1" /></label>
            <label>W<input id="rowW" type="number" step="1" min="10" /></label>
            <label>字号<input id="rowFontSize" type="number" step="1" min="4" /></label>
          </div>
          <div class="section-subtitle" id="rowSelectionStatus">已选 1 行</div>
          <div class="align-grid" aria-label="字段对齐">
            <button type="button" data-align-rows="left">左对齐</button>
            <button type="button" data-align-rows="center">水平居中</button>
            <button type="button" data-align-rows="right">右对齐</button>
            <button type="button" data-align-rows="top">上对齐</button>
            <button type="button" data-align-rows="middle">垂直居中</button>
            <button type="button" data-align-rows="bottom">下对齐</button>
          </div>
          <label class="check-line">
            <input id="showGuides" type="checkbox" />
            <span>显示定位框</span>
          </label>
          <div class="guide-legend">
            <span><i class="guide-label"></i>文字定位框</span>
            <span><i class="guide-clip"></i>裁切框</span>
            <span><i class="guide-row"></i>字段行</span>
            <span><i class="guide-selected-row"></i>当前字段</span>
            <span><i class="guide-multi-row"></i>多选字段</span>
            <span><i class="guide-brand"></i>品牌条</span>
          </div>
        </section>

        <footer class="actions">
          <button id="renderButton" type="button" data-debug-only>生成预览</button>
          <button id="downloadPngButton" type="button" data-debug-only>下载 PNG</button>
          <button id="downloadJpgButton" type="button">导出 JPG 图片</button>
          <button id="solidifyCurrentButtonMobile" class="solidify-button" type="button" data-debug-only>
            固化到使用模式
          </button>
          <button id="resetCurrentButtonMobile" class="danger-button" type="button" data-debug-only>
            重置当前模板
          </button>
          <button id="copyConfigButtonMobile" type="button" data-debug-only>复制当前参数</button>
          <button id="copyAllConfigButton" type="button" data-debug-only>复制全部参数</button>
        </footer>
      </aside>

      <section class="preview-panel">
        <div class="preview-toolbar">
          <div>
            <strong id="currentTemplateName">-</strong>
            <span id="canvasSize">1448 x 1086</span>
          </div>
          <div class="toolbar-actions" data-debug-only>
            <button id="solidifyCurrentButton" class="solidify-button" type="button">固化到使用模式</button>
            <button id="resetCurrentButton" class="danger-button" type="button">重置当前模板</button>
            <button id="copyConfigButton" type="button">复制当前参数</button>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="previewCanvas" width="1448" height="1086"></canvas>
        </div>
      </section>
    </main>

    <div id="debugPasswordOverlay" class="password-overlay" hidden>
      <form id="debugPasswordForm" class="password-dialog">
        <div class="section-title">调整模式验证</div>
        <label class="field-row" for="debugPasswordInput">
          密码
          <input id="debugPasswordInput" type="password" autocomplete="current-password" />
        </label>
        <div id="debugPasswordError" class="password-error" aria-live="polite"></div>
        <div class="password-actions">
          <button id="debugPasswordCancel" type="button">取消</button>
          <button type="submit">进入调整模式</button>
        </div>
      </form>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
